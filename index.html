<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字幕转 LRC 工具</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-lg overflow-hidden">
        <div class="p-6 sm:p-8">
            <header class="text-center mb-6">
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">字幕转 LRC 工具</h1>
                <p class="text-gray-500 mt-2 text-sm sm:text-base">批量将 VTT / SRT / ASS 字幕文件转换为 LRC 歌词文件</p>
            </header>

            <main>
                <!-- 流水线预览 -->
                <div id="pipeline-container" class="mb-6 hidden">
                    <div class="pipeline-wrapper">
                        <div id="pipeline-steps" class="pipeline-steps">
                        </div>
                    </div>
                </div>

                <!-- 标签页 -->
                <div class="border-b border-gray-200 mb-6">
                    <nav class="-mb-px flex gap-2 sm:gap-6 overflow-x-auto" aria-label="Tabs">
                        <button id="tab-zip" class="tab-btn active whitespace-nowrap py-3 px-2 border-b-2 font-medium text-sm">
                            ZIP 压缩包
                        </button>
                        <button id="tab-direct" class="tab-btn whitespace-nowrap py-3 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                            上传字幕
                        </button>
                        <button id="tab-paste" class="tab-btn whitespace-nowrap py-3 px-2 border-b-2 font-medium text-sm text-gray-500 hover:text-gray-700">
                            粘贴文本
                        </button>
                    </nav>
                </div>

                <!-- 标签页内容 -->
                <div>
                    <!-- 上传 ZIP -->
                    <div id="panel-zip" class="tab-content active">
                        <label for="file-input-zip" class="drop-zone cursor-pointer flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-2xl p-8 sm:p-12 text-center transition-all duration-300 ease-in-out hover:border-blue-500 hover:bg-blue-50">
                            <svg class="w-12 h-12 sm:w-16 sm:h-16 text-gray-400 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25H7.5a2.25 2.25 0 00-2.25 2.25v9a2.25 2.25 0 002.25 2.25h9A2.25 2.25 0 0018.75 19.5V10.5A2.25 2.25 0 0016.5 8.25H15M12 12.75V3m0 0l-3.75 3.75M12 3l3.75 3.75" /></svg>
                            <span class="font-semibold text-gray-600 text-sm sm:text-base">点击选择或拖拽 ZIP 压缩包</span>
                            <p class="text-xs sm:text-sm text-gray-500 mt-1">将转换包内字幕文件并保留其他文件 (如 MP3)</p>
                            <input id="file-input-zip" type="file" accept=".zip,application/zip,application/x-zip-compressed">
                        </label>
                    </div>
                    <!-- 直接上传字幕 -->
                    <div id="panel-direct" class="tab-content">
                        <label for="file-input-direct" class="drop-zone cursor-pointer flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-2xl p-8 sm:p-12 text-center transition-all duration-300 ease-in-out hover:border-blue-500 hover:bg-blue-50">
                            <svg class="w-12 h-12 sm:w-16 sm:h-16 text-gray-400 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
                            <span class="font-semibold text-gray-600 text-sm sm:text-base">点击选择或拖拽字幕文件</span>
                            <span class="text-xs sm:text-sm text-gray-400 mt-1">支持 .vtt / .srt / .ass / .ssa 格式</span>
                            <input id="file-input-direct" type="file" multiple accept=".vtt,.srt,.ass,.ssa">
                        </label>
                    </div>
                    <!-- 粘贴文本 -->
                    <div id="panel-paste" class="tab-content">
                        <div class="border border-gray-300 rounded-xl overflow-hidden">
                            <div class="flex items-center gap-2 px-3 py-2 bg-gray-100 border-b border-gray-300">
                                <label class="text-sm font-medium text-gray-700 whitespace-nowrap">字幕格式：</label>
                                <select id="paste-format" class="px-2 py-1 border border-gray-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="srt">SRT</option>
                                    <option value="vtt">VTT</option>
                                    <option value="ass">ASS/SSA</option>
                                </select>
                            </div>
                            <textarea id="paste-input" class="w-full h-48 sm:h-56 p-3 text-sm font-mono focus:outline-none border-none resize-y" placeholder="在此粘贴 SRT/VTT/ASS 字幕内容..."></textarea>
                            <button id="paste-convert-btn" type="button" class="w-full bg-blue-500 text-white font-bold py-3 px-4 hover:bg-blue-600 focus:outline-none transition-all duration-200 btn">
                                转换为 LRC
                            </button>
                        </div>
                        <div class="mt-4">
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-sm font-medium text-gray-700">LRC 输出：</label>
                                <button id="copy-lrc-btn" type="button" class="copy-btn text-sm text-white bg-blue-500 hover:bg-blue-600 px-3 py-1 rounded hidden">复制</button>
                            </div>
                            <textarea id="paste-output" class="w-full h-32 sm:h-40 p-3 border border-gray-300 rounded-xl text-sm font-mono bg-gray-50 resize-y hidden" readonly></textarea>
                            <div id="paste-output-placeholder" class="w-full h-32 sm:h-40 p-3 border border-gray-300 rounded-xl text-sm text-gray-400 bg-gray-50 flex items-center justify-center">转换后的 LRC 内容将显示在这里...</div>
                        </div>
                    </div>
                </div>

                <!-- 平铺选项 -->
                <div id="flatten-option" class="mt-6 hidden">
                    <label class="flex items-center gap-2 cursor-pointer select-none">
                        <input type="checkbox" id="flatten-checkbox" class="w-4 h-4 text-blue-500 rounded border-gray-300 focus:ring-blue-500" checked>
                        <span class="text-sm text-gray-700">平铺 — 将所有文件输出到根目录，重名时自动添加路径前/后缀</span>
                    </label>
                </div>

                <!-- 文件列表 -->
                <div id="file-list-container" class="mt-6 hidden">
                    <h2 class="text-base sm:text-lg font-semibold text-gray-700 mb-2">待处理字幕文件</h2>
                    <div id="file-list" class="space-y-2 max-h-48 sm:max-h-60 overflow-y-auto pr-2"></div>
                </div>
                <!-- 图片预览 -->
                <div id="image-preview-container" class="mt-6 hidden">
                    <h2 class="text-base sm:text-lg font-semibold text-gray-700 mb-2">图片预览 (点击选择封面)</h2>
                    <div id="image-preview-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3 max-h-48 sm:max-h-60 overflow-y-auto pr-2"></div>
                </div>

                <!-- 提示信息 -->
                <div id="status-message" class="text-center mt-4 text-red-500 font-medium text-sm"></div>

                <!-- 操作按钮 -->
                <div id="action-buttons" class="mt-6 flex flex-col sm:flex-row gap-4 hidden">
                    <button id="convert-btn" class="w-full bg-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 btn">
                        <span id="btn-text">转换并下载 ZIP</span>
                        <div id="spinner" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>
                    </button>
                    <button id="clear-btn" class="w-full sm:w-auto bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-xl hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-400 transition-all duration-200 btn">清空</button>
                </div>
            </main>
        </div>
        <div class="text-center text-xs text-gray-400 pb-4">v2.4.0</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
